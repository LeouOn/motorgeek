{# HTMX partial: updated chat messages #}
{% for msg in conversation %}
    {% if msg.role == "user" %}
    <div class="message-user">{{ msg.text }}</div>
    {% elif msg.role == "agent" %}
    <div class="message-agent">{{ msg.text | safe }}</div>
    {% elif msg.role == "tool" %}
    <details class="tool-call">
        <summary>🔧 {{ msg.tool_name }}</summary>
        <pre>{{ msg.tool_result }}</pre>
    </details>
    {% endif %}
{% endfor %}
